<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Value Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── THEMES ── */
  :root {
    --bg:         #0f0f0f;
    --surface:    #1a1a1a;
    --surface2:   #111111;
    --border:     #2a2a2a;
    --border2:    #333333;
    --text:       #ffffff;
    --text-muted: #888888;
    --text-dim:   #999999;
    --btn-bg:     #081a30;
    --btn-border: #0d2a4a;
    --input-bg:   #1a1a1a;
  }

  [data-theme="light"] {
    --bg:         #f5f5f5;
    --surface:    #ffffff;
    --surface2:   #f0f0f0;
    --border:     #dddddd;
    --border2:    #cccccc;
    --text:       #111111;
    --text-muted: #666666;
    --text-dim:   #888888;
    --btn-bg:     #081a30;
    --btn-border: #0d2a4a;
    --input-bg:   #ffffff;
  }

  [data-theme="grey"] {
    --bg:         #2e2e2e;
    --surface:    #3a3a3a;
    --surface2:   #333333;
    --border:     #4a4a4a;
    --border2:    #555555;
    --text:       #eeeeee;
    --text-muted: #aaaaaa;
    --text-dim:   #bbbbbb;
    --btn-bg:     #1a3a5a;
    --btn-border: #2a4a6a;
    --input-bg:   #3a3a3a;
  }

  html, body {
    background: var(--bg) !important;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100%; min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    transition: background 0.2s, color 0.2s;
  }

  .page { min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }

  /* TOP BAR */
  .top-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 4px 0 0; margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .mode-group { display: flex; align-items: center; gap: 8px; }
  .mode-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .mode-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
    background: none; border: none; cursor: pointer;
    padding: 2px 0; border-bottom: 1px solid transparent; transition: all 0.15s;
  }
  .mode-btn.active { color: var(--text); border-bottom-color: var(--border2); }
  .mode-sep { color: var(--border2); font-size: 9px; }

  /* THEME SWITCHER */
  .theme-group { display: flex; align-items: center; gap: 6px; }
  .theme-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .theme-dot {
    width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.15s;
  }
  .theme-dot.active { border-color: var(--text); }
  .theme-dot.dark  { background: #0f0f0f; box-shadow: inset 0 0 0 1px #444; }
  .theme-dot.light { background: #f5f5f5; box-shadow: inset 0 0 0 1px #ccc; }
  .theme-dot.grey  { background: #2e2e2e; box-shadow: inset 0 0 0 1px #555; }

  /* CENTER */
  .center { flex: 1; display: flex; align-items: center; justify-content: center; }
  .form-wrap { width: 100%; max-width: 400px; text-align: center; }
  .form-wrap.split-mode { max-width: 700px; }

  .pinnacle-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .pin-field { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .pin-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }

  input[type="number"] {
    background: var(--input-bg); border: 1px solid var(--border2); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700;
    padding: 9px 10px; width: 100%; outline: none; text-align: center;
    transition: border-color 0.15s, background 0.2s; -moz-appearance: textfield;
    -webkit-appearance: none; border-radius: 0;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: #4a6a8a; }

  .section-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  .work-block { margin-bottom: 16px; }
  .work-block input { font-size: 22px; padding: 11px 16px; width: 100%; }

  .btn {
    width: 100%; background: var(--btn-bg); color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px;
    border: 1px solid var(--btn-border); padding: 13px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border-radius: 0; -webkit-appearance: none;
  }
  .btn:hover { filter: brightness(1.2); }
  .btn:active { transform: scale(0.98); }

  .error { color: #ff3b3b; font-size: 11px; margin-bottom: 12px; display: none; }

  /* RESULTS */
  .results {
    display: none; background: var(--surface); border: 1px solid var(--border);
    padding: 14px; margin-top: 16px; animation: fadeIn 0.3s ease;
    transition: background 0.2s;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .results.visible { display: block; }

  .res-toprow { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .res-meta { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .res-meta-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
  .res-meta-value { font-size: 13px; font-weight: 700; color: var(--text-dim); }

  .res-cols { display: flex; gap: 6px; margin-bottom: 12px; }
  .res-col { flex: 1; }
  .res-col-header { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 5px; }
  .res-box { background: var(--surface2); border: 1px solid var(--border); padding: 8px 4px; text-align: center; }
  .res-box-main { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .res-box-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .res-bottom { border-top: 1px solid var(--border); padding-top: 10px; }
  .res-bottom-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 6px; }
  .res-edge-cols { display: flex; gap: 6px; }
  .res-edge-col { flex: 1; }
  .edge-box { padding: 10px 4px; font-size: 19px; font-weight: 700; text-align: center; border: 1px solid transparent; }

  .verdict { margin-top: 10px; padding: 9px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; text-align: center; }
  .verdict.no { background: rgba(255,59,59,0.08); border: 1px solid #ff3b3b; color: #ff3b3b; }

  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
  .btn-clear {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border2);
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px;
    padding: 13px; cursor: pointer; transition: all 0.15s; border-radius: 0;
    -webkit-appearance: none; flex: 0 0 70px;
  }
  .btn-clear:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-clear:active { transform: scale(0.98); }

  .res-edge-cols.hidden, .res-bottom-label.hidden { display: none; }

  .two-way { display: block; }
  .three-way { display: none; }
  .reverse-way { display: none; }
  .split-way { display: none; }

  /* PASSWORD OVERLAY */
  .pw-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .pw-overlay.hidden { display: none; }
  .pw-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
  .pw-input {
    background: var(--input-bg); border: 1px solid var(--border2); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    padding: 11px 16px; width: 200px; outline: none; text-align: center;
    border-radius: 0; -webkit-appearance: none; -moz-appearance: textfield;
    letter-spacing: 6px;
  }
  .pw-input::-webkit-outer-spin-button,
  .pw-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .pw-input:focus { border-color: #4a6a8a; }
  .pw-error { color: #ff3b3b; font-size: 11px; min-height: 16px; }

  /* SPLIT BET TABLE */
  .split-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 15px; }
  .split-table th {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
    padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border2); font-weight: 400;
  }
  .split-table td { padding: 5px 4px; text-align: center; vertical-align: middle; }
  .split-table td input[type="number"] {
    font-size: 17px; padding: 10px 8px; width: 100%; min-width: 0;
  }
  .split-table .col-sum { width: 22%; }
  .split-table .col-k   { width: 13%; }
  .split-table .col-e   { width: 17%; }
  .split-table .col-sep { width: 10px; padding: 0 !important; }
  .split-table .col-sep-cell { width: 10px; padding: 0 4px !important; }
  .split-table .th-sep  { width: 10px; padding: 0 !important; }
  .td-sep-line {
    width: 2px; background: var(--border2); height: 100%;
    display: block; margin: 0 auto;
  }
  .split-table .td-marg { font-size: 13px; color: var(--text-muted); padding: 5px 6px; white-space: nowrap; }
  .split-table .td-kval { font-size: 13px; color: var(--text-muted); padding: 5px 6px; white-space: nowrap; }
  .split-table .td-num  { font-size: 12px; color: var(--text-muted); padding: 5px 6px; white-space: nowrap; }
  .split-table .td-calc   { font-size: 16px; font-weight: 700; padding: 5px 10px; white-space: nowrap; }
  .split-table .td-income { font-size: 16px; font-weight: 700; padding: 5px 10px; white-space: nowrap; }

  /* sum display field */
  .sum-display {
    background: var(--input-bg); border: 1px solid var(--border2); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700;
    padding: 10px 8px; width: 100%; text-align: center; cursor: text;
    outline: none; caret-color: var(--text);
  }
  .sum-display:focus { border-color: #4a6a8a; }
  .split-row-del {
    background: none; border: none; color: var(--text-muted); font-size: 18px;
    cursor: pointer; padding: 2px 6px; transition: color 0.15s; line-height: 1;
  }
  .split-row-del:hover { color: #ff4444; }

  /* split checkboxes inline with coeff */
  .split-cb-wrap { display: flex; align-items: center; gap: 6px; }
  .split-cb-wrap input[type="checkbox"] {
    width: 17px; height: 17px; accent-color: #7dc87d; cursor: pointer;
    margin: 0; padding: 0; flex-shrink: 0;
  }
  .split-cb-wrap input[type="number"] { flex: 1; }
  .split-add-btn {
    background: none; border: 1px solid var(--border2); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
    padding: 6px 14px; cursor: pointer; transition: all 0.15s; width: 100%; margin-bottom: 14px;
    border-radius: 0;
  }
  .split-add-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .split-total {
    border-top: 1px solid var(--border2); padding-top: 10px; margin-bottom: 14px;
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between;
  }
  .split-total-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 70px; }
  .split-total-lbl { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .split-total-val { font-size: 16px; font-weight: 700; color: var(--text); }
  .split-total-val.edge-pos { color: #8fcc55; }
  .split-total-val.edge-neg { color: #ff4444; }

  /* Reverse mode result row for pinnacle coefficients */
  .rev-pin-result { display: flex; gap: 6px; margin-bottom: 12px; }
  .rev-pin-col { flex: 1; }
</style>
</head>
<body data-theme="dark">

<!-- PASSWORD OVERLAY -->
<div class="pw-overlay hidden" id="pw-overlay">
  <div class="pw-label">Введите пароль</div>
  <input class="pw-input" type="password" id="pw-input" maxlength="10" placeholder="••••"
    oninput="checkPw()" onkeydown="if(event.key==='Enter')checkPw(true)">
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="page">

  <div class="top-bar">
    <div class="mode-group">
      <span class="mode-lbl">Режим:</span>
      <button class="mode-btn active" onclick="setMode(2)">Обычный</button>
      <span class="mode-sep">или</span>
      <button class="mode-btn" onclick="setMode(3)">Расширенный</button>
      <span class="mode-sep">или</span>
      <button class="mode-btn" onclick="tryMode('rev')">Обратный</button>
      <span class="mode-sep">или</span>
      <button class="mode-btn" onclick="tryMode('split')">Дробная</button>
    </div>
    <div class="theme-group">
      <span class="theme-lbl">Тема:</span>
      <div class="theme-dot dark active" onclick="setTheme('dark')" title="Тёмная"></div>
      <div class="theme-dot grey" onclick="setTheme('grey')" title="Серая"></div>
      <div class="theme-dot light" onclick="setTheme('light')" title="Светлая"></div>
    </div>
  </div>

  <div class="center">
    <div class="form-wrap">

      <div class="two-way">
        <div class="pinnacle-row">
          <div class="pin-field">
            <div class="pin-label">Исход 1</div>
            <input type="number" id="k2_1" placeholder="4.17" step="0.001" inputmode="decimal">
          </div>
          <div class="pin-field">
            <div class="pin-label">Исход 2</div>
            <input type="number" id="k2_2" placeholder="1.20" step="0.001" inputmode="decimal">
          </div>
        </div>
      </div>

      <div class="three-way">
        <div class="pinnacle-row">
          <div class="pin-field">
            <div class="pin-label">Исход 1</div>
            <input type="number" id="k3_1" placeholder="3.20" step="0.001" inputmode="decimal">
          </div>
          <div class="pin-field">
            <div class="pin-label">Ничья</div>
            <input type="number" id="k3_x" placeholder="3.50" step="0.001" inputmode="decimal">
          </div>
          <div class="pin-field">
            <div class="pin-label">Исход 2</div>
            <input type="number" id="k3_2" placeholder="2.10" step="0.001" inputmode="decimal">
          </div>
        </div>
      </div>

      <!-- REVERSE MODE -->
      <div class="reverse-way">
        <div class="pinnacle-row">
          <div class="pin-field">
            <div class="pin-label">Ваш кэф</div>
            <input type="number" id="rev_k" placeholder="5.27" step="0.001" inputmode="decimal">
          </div>
          <div class="pin-field">
            <div class="pin-label">Маржа %</div>
            <input type="number" id="rev_margin" placeholder="7.1" step="0.01" inputmode="decimal">
          </div>
          <div class="pin-field">
            <div class="pin-label">Дох-ть %</div>
            <input type="number" id="rev_edge" placeholder="5" step="0.01" inputmode="decimal">
          </div>
        </div>
      </div>

      <!-- SPLIT BET MODE -->
      <div class="split-way" id="split-way">
        <table class="split-table" id="split-table">
          <thead>
            <tr>
              <th></th>
              <th>Сумма</th>
              <th>Раб. К</th>
              <th class="th-sep"></th>
              <th>Эт. К1</th>
              <th>Эт. К2</th>
              <th>Маржа</th>
              <th>К</th>
              <th>Доход-ть</th>
              <th>Доход</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="split-tbody"></tbody>
        </table>
        <button class="split-add-btn" onclick="splitAddRow()">+ Добавить строку</button>
        <button class="split-add-btn" onclick="clearAll()" style="margin-bottom:6px;color:var(--text-muted)">× Очистить</button>
        <div class="split-total" id="split-total">
          <div class="split-total-cell">
            <div class="split-total-lbl">Итого сумма</div>
            <div class="split-total-val" id="st-sum">—</div>
          </div>
          <div class="split-total-cell">
            <div class="split-total-lbl">Ср. Раб. К</div>
            <div class="split-total-val" id="st-wk">—</div>
          </div>
          <div class="split-total-cell">
            <div class="split-total-lbl">Доход-ть</div>
            <div class="split-total-val" id="st-edge">—</div>
          </div>
          <div class="split-total-cell">
            <div class="split-total-lbl">Доход</div>
            <div class="split-total-val" id="st-income">—</div>
          </div>
        </div>
      </div>

      <div class="section-label" id="work-section-label">Рабочий коэффициент</div>
      <div class="work-block" id="work-block">
        <input type="number" id="ksng" placeholder="5.25" step="0.001" inputmode="decimal">
      </div>

      <div class="error" id="error"></div>
      <div class="btn-row">
        <button class="btn-clear" onclick="clearAll()" title="Очистить">×</button>
        <button class="btn" onclick="calculate()">РАССЧИТАТЬ</button>
      </div>

      <div class="results" id="results">
        <div class="res-toprow">
          <div class="res-meta">
            <div class="res-meta-label">Маржа</div>
            <div class="res-meta-value" id="r-margin"></div>
          </div>
          <div class="res-meta">
            <div class="res-meta-label">K</div>
            <div class="res-meta-value" id="r-k"></div>
          </div>
        </div>
        <div class="res-cols" id="res-cols"></div>
        <div class="res-bottom">
          <div class="res-bottom-label" id="res-bottom-label">Доходность</div>
          <div class="res-edge-cols" id="res-edge-cols"></div>
        </div>
        <div class="verdict" id="verdict" style="display:none"></div>
      </div>

    </div>
  </div>
</div>

<script>
  let currentMode = 2;
  let currentTheme = 'dark';
  const PROTECTED_MODES = ['rev', 'split'];
  const PASSWORD = '7621';
  let unlocked = false;
  let pendingMode = null;

  function setTheme(t) {
    currentTheme = t;
    document.body.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-dot').forEach(d => {
      d.classList.toggle('active', d.classList.contains(t));
    });
    localStorage.setItem('theme', t);
  }

  // Восстановить тему
  const saved = localStorage.getItem('theme');
  if (saved) setTheme(saved);

  function tryMode(n) {
    if (PROTECTED_MODES.includes(n) && !unlocked) {
      pendingMode = n;
      const overlay = document.getElementById('pw-overlay');
      overlay.classList.remove('hidden');
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-error').textContent = '';
      setTimeout(() => document.getElementById('pw-input').focus(), 50);
    } else {
      setMode(n);
    }
  }

  function checkPw(force) {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      unlocked = true;
      document.getElementById('pw-overlay').classList.add('hidden');
      if (pendingMode !== null) { setMode(pendingMode); pendingMode = null; }
    } else if (force) {
      document.getElementById('pw-error').textContent = 'Неверный пароль';
      document.getElementById('pw-input').value = '';
    }
  }

  function setMode(n) {
    currentMode = n;
    const btns = document.querySelectorAll('.mode-btn');
    btns.forEach((b,i) => {
      b.classList.toggle('active',
        (i===0&&n===2)||(i===1&&n===3)||(i===2&&n==='rev')||(i===3&&n==='split'));
    });
    document.querySelector('.two-way').style.display = n===2 ? 'block' : 'none';
    document.querySelector('.three-way').style.display = n===3 ? 'block' : 'none';
    document.querySelector('.reverse-way').style.display = n==='rev' ? 'block' : 'none';
    document.querySelector('.split-way').style.display = n==='split' ? 'block' : 'none';

    const workLabel = document.getElementById('work-section-label');
    const workBlock = document.getElementById('work-block');
    const btnRow = document.querySelector('.btn-row');
    const results = document.getElementById('results');

    if (n === 'rev' || n === 'split') {
      workLabel.style.display = 'none';
      workBlock.style.display = 'none';
    } else {
      workLabel.style.display = 'block';
      workBlock.style.display = 'block';
    }

    const formWrap = document.querySelector('.form-wrap');
    if (n === 'split') {
      formWrap.classList.add('split-mode');
      btnRow.style.display = 'none';
      results.classList.remove('visible');
      if (document.getElementById('split-tbody').rows.length === 0) {
        splitAddRow(); splitAddRow();
      }
    } else {
      formWrap.classList.remove('split-mode');
      btnRow.style.display = 'flex';
    }

    results.classList.remove('visible');
  }

  /* ── SPLIT BET ── */
  let splitRowId = 0;

  function splitAddRow() {
    const tbody = document.getElementById('split-tbody');
    const id = ++splitRowId;
    const tr = document.createElement('tr');
    tr.id = 'sr-' + id;
    tr.innerHTML = `
      <td class="td-num">${tbody.rows.length + 1}</td>
      <td class="col-sum"><input type="text" id="ss-${id}" placeholder="250 000" inputmode="numeric" oninput="fmtSum(this)" data-raw="" class="sum-display"></td>
      <td class="col-k"><input type="number" id="sw-${id}" placeholder="2.75" step="0.001" inputmode="decimal" oninput="splitCalc()"></td>
      <td class="col-sep-cell"><span class="td-sep-line"></span></td>
      <td class="col-e">
        <div class="split-cb-wrap">
          <input type="checkbox" id="scb1-${id}" onchange="splitCbChange(${id},1)" checked>
          <input type="number" id="se1-${id}" placeholder="1.43" step="0.001" inputmode="decimal" oninput="splitCalc()">
        </div>
      </td>
      <td class="col-e">
        <div class="split-cb-wrap">
          <input type="number" id="se2-${id}" placeholder="2.85" step="0.001" inputmode="decimal" oninput="splitCalc()">
          <input type="checkbox" id="scb2-${id}" onchange="splitCbChange(${id},2)">
        </div>
      </td>
      <td class="td-marg" id="smrg-${id}">—</td>
      <td class="td-kval" id="skvl-${id}">—</td>
      <td class="td-calc" id="syd-${id}">—</td>
      <td class="td-income" id="sinc-${id}">—</td>
      <td><button class="split-row-del" onclick="splitDelRow(${id})">×</button></td>`;
    tbody.appendChild(tr);
    splitCalc();
  }

  function fmtSum(el) {
    const raw = el.value.replace(/\D/g, '');
    el.dataset.raw = raw;
    el.value = raw ? parseInt(raw).toLocaleString('ru-RU') : '';
    splitCalc();
  }

  function splitCbChange(id, which) {
    // radio-like: only one can be checked
    const cb1 = document.getElementById('scb1-'+id);
    const cb2 = document.getElementById('scb2-'+id);
    if (which === 1) { cb2.checked = false; }
    else             { cb1.checked = false; }
    splitCalc();
  }

  function splitDelRow(id) {
    const tr = document.getElementById('sr-' + id);
    if (tr) tr.remove();
    // renumber
    document.querySelectorAll('#split-tbody tr .td-num').forEach((td, i) => td.textContent = i + 1);
    splitCalc();
  }

  function splitCalc() {
    const rows = document.querySelectorAll('#split-tbody tr');
    let totalSum = 0, totalIncome = 0, wkSum = 0, validRows = 0;

    rows.forEach(tr => {
      const id = tr.id.replace('sr-', '');
      const sEl = document.getElementById('ss-'+id);
      const s   = sEl ? (parseFloat(sEl.dataset.raw) || 0) : 0;
      const w   = parseFloat(((document.getElementById('sw-'+id)||{}).value||'').replace(',','.'));
      const e1  = parseFloat(((document.getElementById('se1-'+id)||{}).value||'').replace(',','.'));
      const e2  = parseFloat(((document.getElementById('se2-'+id)||{}).value||'').replace(',','.'));
      const cb1 = (document.getElementById('scb1-'+id)||{}).checked;
      const cb2 = (document.getElementById('scb2-'+id)||{}).checked;
      const ydEl  = document.getElementById('syd-'+id);
      const incEl = document.getElementById('sinc-'+id);
      if (!ydEl) return;

      if (!s || !w || !e1 || !e2 || w < 1.001 || e1 < 1.001 || e2 < 1.001 || (!cb1 && !cb2)) {
        ydEl.textContent = '—'; incEl.textContent = '—';
        const mrgEl = document.getElementById('smrg-'+id);
        const kvlEl = document.getElementById('skvl-'+id);
        if (mrgEl) mrgEl.textContent = '—';
        if (kvlEl) kvlEl.textContent = '—';
        return;
      }

      // Power method
      const q1 = 1 / e1, q2 = 1 / e2;
      const k = findK([q1, q2]);
      const margin = (q1 + q2 - 1) * 100;

      // показываем маржу и К
      const mrgEl = document.getElementById('smrg-'+id);
      const kvlEl = document.getElementById('skvl-'+id);
      if (mrgEl) mrgEl.textContent = margin.toFixed(2) + '%';
      if (kvlEl) kvlEl.textContent = k.toFixed(4).replace('.', ',');
      const p1 = Math.pow(q1, k);
      const p2 = Math.pow(q2, k);
      const p_true = cb1 ? p1 : p2;

      const edge = (w * p_true - 1) * 100;
      // Доход = Сумма × Доходность
      const income = s * edge / 100;

      const sign = edge >= 0 ? '+' : '';
      ydEl.textContent = sign + edge.toFixed(2).replace('.', ',') + ' %';
      ydEl.style.color  = edge >= 0 ? '#8fcc55' : '#ff4444';
      incEl.textContent = formatRub(Math.round(income));
      incEl.style.color = income >= 0 ? '#8fcc55' : '#ff4444';

      totalSum += s;
      totalIncome += income;
      wkSum += s * w;
      validRows++;
    });

    const stSum    = document.getElementById('st-sum');
    const stWk     = document.getElementById('st-wk');
    const stEdge   = document.getElementById('st-edge');
    const stIncome = document.getElementById('st-income');

    if (validRows === 0) {
      stSum.textContent = '—'; stWk.textContent = '—';
      stEdge.textContent = '—'; stIncome.textContent = '—';
      stEdge.className = 'split-total-val';
      stIncome.className = 'split-total-val';
      return;
    }
    const avgWk = wkSum / totalSum;
    const totalEdgePct = totalIncome / totalSum * 100;
    const sign = totalEdgePct >= 0 ? '+' : '';
    stSum.textContent    = formatRub(Math.round(totalSum));
    stWk.textContent     = avgWk.toFixed(6).replace('.', ',');
    stEdge.textContent   = sign + totalEdgePct.toFixed(2).replace('.', ',') + ' %';
    stEdge.className     = 'split-total-val ' + (totalEdgePct >= 0 ? 'edge-pos' : 'edge-neg');
    stIncome.textContent = formatRub(Math.round(totalIncome));
    stIncome.className   = 'split-total-val ' + (totalIncome >= 0 ? 'edge-pos' : 'edge-neg');
  }

  function formatRub(n) {
    return n.toLocaleString('ru-RU') + ' ₽';
  }

  function findK(qs) {
    const rawSum = qs.reduce((a, q) => a + q, 0);
    if (Math.abs(rawSum - 1.0) < 1e-6) return 1.0;
    let lo = 0.5, hi = 6.0;
    for (let i = 0; i < 300; i++) {
      const mid = (lo + hi) / 2;
      const sum = qs.reduce((a, q) => a + Math.pow(q, mid), 0);
      if (Math.abs(sum - 1.0) < 1e-10) return mid;
      if (sum > 1.0) lo = mid; else hi = mid;
    }
    return (lo + hi) / 2;
  }

  function edgeColor(edge) {
    if (edge >= 10) return { bg: '#0d3a0d', text: '#6dbf6d', border: '#1a6a1a', shadow: '0 0 8px rgba(80,200,80,0.4)' };
    if (edge >= 3)  return { bg: '#1a3a10', text: '#8fcc55', border: '#2a6a1a', shadow: '0 0 6px rgba(100,190,50,0.3)' };
    if (edge >= 0)  return { bg: '#2a3a10', text: '#b8d44a', border: '#3a6a1a', shadow: '0 0 5px rgba(160,200,50,0.25)' };
    if (edge >= -1) return { bg: '#3a3200', text: '#f0cc50', border: '#6a5200', shadow: '0 0 5px rgba(220,180,40,0.3)' };
    return { bg: '#3a0d0d', text: '#ff4444', border: '#7a1a1a', shadow: '0 0 8px rgba(255,50,50,0.5)' };
  }

  function getVal(id) {
    const raw = document.getElementById(id).value.replace(',', '.');
    return parseFloat(raw);
  }

  function calculate() {
    if (currentMode === 'rev') {
      calculateReverse();
      return;
    }

    const ksngRaw = document.getElementById('ksng').value;
    const hasWorking = ksngRaw.trim() !== '';
    const ksng = getVal('ksng');
    const err = document.getElementById('error');
    let qs = [], labels = [];

    if (hasWorking && (!ksng || ksng < 1.001)) {
      err.textContent='Введите корректный рабочий коэффициент';
      err.style.display='block';
      document.getElementById('results').classList.remove('visible');
      return;
    }

    if (currentMode === 2) {
      const v1 = getVal('k2_1'), v2 = getVal('k2_2');
      if (!v1||!v2||v1<1.001||v2<1.001) {
        err.textContent='Введите корректные коэффициенты Pinnacle';
        err.style.display='block';
        document.getElementById('results').classList.remove('visible');
        return;
      }
      qs = [1/v1, 1/v2]; labels = ['Исход 1','Исход 2'];
      document.getElementById('r-margin').textContent = ((qs[0]+qs[1]-1)*100).toFixed(2)+'%';
    } else {
      const v1 = getVal('k3_1'), vx = getVal('k3_x'), v2 = getVal('k3_2');
      if (!v1||!vx||!v2||v1<1.001||vx<1.001||v2<1.001) {
        err.textContent='Введите корректные коэффициенты Pinnacle';
        err.style.display='block';
        document.getElementById('results').classList.remove('visible');
        return;
      }
      qs = [1/v1, 1/vx, 1/v2]; labels = ['Исход 1','Ничья','Исход 2'];
      document.getElementById('r-margin').textContent = ((qs[0]+qs[1]+qs[2]-1)*100).toFixed(2)+'%';
    }

    err.style.display = 'none';
    const k = findK(qs);
    const ps = qs.map(q => Math.pow(q, k));
    document.getElementById('r-k').textContent = k.toFixed(4).replace('.', ',');

    const colsEl = document.getElementById('res-cols');
    colsEl.innerHTML = '';
    ps.forEach((p, i) => {
      const col = document.createElement('div');
      col.className = 'res-col';
      col.innerHTML = `
        <div class="res-col-header">${labels[i]}</div>
        <div class="res-box">
          <div class="res-box-main">${(1/p).toFixed(2)}</div>
          <div class="res-box-sub">${(p*100).toFixed(1)}%</div>
        </div>`;
      colsEl.appendChild(col);
    });

    const edgeColsEl = document.getElementById('res-edge-cols');
    const edgeLabel = document.getElementById('res-bottom-label');

    if (!hasWorking) {
      edgeColsEl.classList.add('hidden');
      edgeLabel.classList.add('hidden');
      document.getElementById('verdict').style.display = 'none';
    } else {
      edgeColsEl.classList.remove('hidden');
      edgeLabel.classList.remove('hidden');
      edgeColsEl.innerHTML = '';
      let anyPositive = false;
      ps.forEach((p) => {
        const edge = (ksng * p - 1) * 100;
        if (edge > 0) anyPositive = true;
        const c = edgeColor(edge);
        const sign = edge >= 0 ? '+' : '';
        const col = document.createElement('div');
        col.className = 'res-edge-col';
        col.innerHTML = `<div class="edge-box" style="background:${c.bg};color:${c.text};border-color:${c.border};text-shadow:${c.shadow}">${sign}${edge.toFixed(1)}%</div>`;
        edgeColsEl.appendChild(col);
      });

      const verdict = document.getElementById('verdict');
      if (anyPositive) {
        verdict.style.display = 'none';
      } else {
        verdict.textContent = '✗ NO VALUE';
        verdict.className = 'verdict no';
        verdict.style.display = 'block';
      }
    }

    document.getElementById('results').classList.add('visible');
  }

  function calculateReverse() {
    const err = document.getElementById('error');
    const kWork = getVal('rev_k');
    const marginPct = getVal('rev_margin');
    const edgePct = getVal('rev_edge');

    if (!kWork || kWork < 1.001 || isNaN(marginPct) || isNaN(edgePct)) {
      err.textContent = 'Введите корректные значения';
      err.style.display = 'block';
      document.getElementById('results').classList.remove('visible');
      return;
    }

    const margin = marginPct / 100;
    const edge = edgePct / 100;

    // p — истинная вероятность события, на которое поставили (старая мультипликативная формула)
    const p = (1 + edge) / kWork;

    if (p <= 0 || p >= (1 + margin)) {
      err.textContent = 'Невозможные входные данные — проверьте маржу и доходность';
      err.style.display = 'block';
      document.getElementById('results').classList.remove('visible');
      return;
    }

    // сырые вероятности (с равномерной маржой)
    const q1 = p * (1 + margin);          // событие, на которое поставили
    const q2 = (1 + margin) - q1;          // второе событие

    const kPin1 = 1 / q1; // коэффициент Pinnacle на ваше событие
    const kPin2 = 1 / q2; // коэффициент Pinnacle на второе событие

    err.style.display = 'none';

    // Маржа (проверка)
    document.getElementById('r-margin').textContent = ((q1 + q2 - 1) * 100).toFixed(2) + '%';

    // Power method на найденных qs
    const qs = [q1, q2];
    const k = findK(qs);
    const ps = qs.map(q => Math.pow(q, k));
    document.getElementById('r-k').textContent = k.toFixed(4).replace('.', ',');

    // Колонки: коэффициенты Pinnacle + новые вероятности/безубыточность
    const colsEl = document.getElementById('res-cols');
    colsEl.innerHTML = '';
    const labels = ['Ваше событие', 'Другое событие'];
    const kPins = [kPin1, kPin2];
    ps.forEach((p2, i) => {
      const col = document.createElement('div');
      col.className = 'res-col';
      col.innerHTML = `
        <div class="res-col-header">${labels[i]}</div>
        <div class="res-box">
          <div class="res-box-main">${kPins[i].toFixed(3).replace('.', ',')}</div>
        </div>`;
      colsEl.appendChild(col);
    });

    // Новая доходность по Power-методу для исходного рабочего кэфа
    const edgeColsEl = document.getElementById('res-edge-cols');
    const edgeLabel = document.getElementById('res-bottom-label');
    edgeColsEl.classList.remove('hidden');
    edgeLabel.classList.remove('hidden');
    edgeLabel.textContent = 'Доходность (Power)';
    edgeColsEl.innerHTML = '';

    let anyPositive = false;
    // Доходность считаем только для "вашего события" с тем же рабочим кэфом
    const newEdge = (kWork * ps[0] - 1) * 100;
    if (newEdge > 0) anyPositive = true;
    const c = edgeColor(newEdge);
    const sign = newEdge >= 0 ? '+' : '';
    const col = document.createElement('div');
    col.className = 'res-edge-col';
    col.innerHTML = `<div class="edge-box" style="background:${c.bg};color:${c.text};border-color:${c.border};text-shadow:${c.shadow}">${sign}${newEdge.toFixed(1)}%</div>`;
    edgeColsEl.appendChild(col);

    // вторая колонка — пустая заглушка для выравнивания
    const col2 = document.createElement('div');
    col2.className = 'res-edge-col';
    col2.innerHTML = `<div class="edge-box" style="background:transparent;border-color:var(--border);color:var(--text-muted)">—</div>`;
    edgeColsEl.appendChild(col2);

    const verdict = document.getElementById('verdict');
    if (anyPositive) {
      verdict.style.display = 'none';
    } else {
      verdict.textContent = '✗ NO VALUE';
      verdict.className = 'verdict no';
      verdict.style.display = 'block';
    }

    document.getElementById('results').classList.add('visible');
  }

  function clearAll() {
    ['k2_1','k2_2','k3_1','k3_x','k3_2','ksng','rev_k','rev_margin','rev_edge'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('error').style.display = 'none';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('res-bottom-label').textContent = 'Доходность';
    if (currentMode === 'rev') {
      document.getElementById('rev_k').focus();
    } else if (currentMode === 'split') {
      // clear split rows
      document.getElementById('split-tbody').innerHTML = '';
      splitRowId = 0;
      splitAddRow(); splitAddRow();
    } else {
      document.getElementById('k2_1').focus();
    }
  }

  document.addEventListener('keydown', e => { if (e.key==='Enter' && currentMode !== 'split') calculate(); });
</script>
